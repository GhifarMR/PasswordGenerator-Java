name: Build Java Ant Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Ant
      run: |
        cd PasswordGenerator
        ant compile jar

    - name: Upload Runnable JAR
      uses: actions/upload-artifact@v4
      with:
        name: PasswordGenerator-Release
        path: PasswordGenerator/dist/*.jar
